    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
       
        :root {
            --tw-color-primary: #22c55e;
        }
       
        body {
            font-family: 'Noto Sans TC', system-ui, sans-serif;
        }
       
        .minesweeper-grid {
            display: grid;
            gap: 2px;
            background: #4ade80;
            padding: 4px;
            border: 4px solid #166534;
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.3);
        }
       
        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            width: 32px;
            height: 32px;
            background: #e5d9b8;
            border: 3px solid #f1e9d2;
            border-top-color: #f8f1e0;
            border-left-color: #f8f1e0;
            box-shadow: inset 2px 2px 0 #c0c0c0,
                        inset -2px -2px 0 #808080;
            cursor: pointer;
            user-select: none;
        }
       
        .cell.revealed {
            background: #d4c9a8;
            border: 2px solid #a8a8a8;
            box-shadow: none;
            font-size: 20px;
        }
       
        .cell.flagged {
            background: #e5d9b8;
            border: 3px solid #f1e9d2;
            box-shadow: inset 2px 2px 0 #c0c0c0,
                        inset -2px -2px 0 #808080;
        }
       
        .mini-grid .cell {
            width: 16px;
            height: 16px;
            font-size: 11px;
        }
       
        .number-1 { color: #1e40af; }
        .number-2 { color: #15803d; }
        .number-3 { color: #b91c1c; }
        .number-4 { color: #6b21a8; }
        .number-5 { color: #854d0e; }
        .number-6 { color: #0f766e; }
        .number-7 { color: #1f2937; }
        .number-8 { color: #444444; }
       
        .header-bg {
            background: linear-gradient(to right, #166534, #4ade80);
        }
       
        .modal {
            animation: modalPop 0.3s ease;
        }
       
        @keyframes modalPop {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>

    <script>
        // ====================== Firebase 配置（已修正 databaseURL） ======================
        const firebaseConfig = {
            apiKey: "AIzaSyCtuXt-ylrLFhjOoj7U7hGbStVQx2l22QY",
            authDomain: "blacksky-minesweeper-7b1a1.firebaseapp.com",
            projectId: "blacksky-minesweeper-7b1a1",
            storageBucket: "blacksky-minesweeper-7b1a1.firebasestorage.app",
            messagingSenderId: "7219715494",
            appId: "1:7219715494:web:a2fd9ad403bb78a981c367",
            measurementId: "G-BYT8FPREKL",
            databaseURL: "https://blacksky-minesweeper-7b1a1-default-rtdb.firebaseio.com"
        };

        // ====================== 全局變數 ======================
        let firebaseApp, auth, db;
        let currentUser = null;
        let playerNickname = "黑空玩家";
        let currentMode = null;
        let currentRoomId = null;
        let myRole = null;
        let myBoard = null;
        let opponentBoardState = null;
        let myTimerInterval = null;
        let roomsRef = null;

        const difficulties = {
            easy: { rows: 9, cols: 9, mines: 10, label: '初級' },
            medium: { rows: 16, cols: 16, mines: 40, label: '中等' },
            hard: { rows: 16, cols: 30, mines: 99, label: '高級' }
        };
        let selectedDifficulty = 'medium';

        // ====================== Minesweeper 類別 ======================
        class Minesweeper {
            constructor(rows, cols, mines) {
                this.rows = rows;
                this.cols = cols;
                this.mines = mines;
                this.grid = Array.from({ length: rows }, () => Array(cols).fill(0));
                this.revealed = Array.from({ length: rows }, () => Array(cols).fill(false));
                this.flagged = Array.from({ length: rows }, () => Array(cols).fill(false));
                this.firstClick = true;
                this.timer = 0;
                this.gameOver = false;
                this.won = false;
                this.revealedValues = Array.from({ length: rows }, () => Array(cols).fill(null));
            }
           
            placeMines(excludeRow, excludeCol) {
                let placed = 0;
                while (placed < this.mines) {
                    const r = Math.floor(Math.random() * this.rows);
                    const c = Math.floor(Math.random() * this.cols);
                    if (r === excludeRow && c === excludeCol) continue;
                    if (this.grid[r][c] !== -1) {
                        this.grid[r][c] = -1;
                        placed++;
                    }
                }
                this.calculateNumbers();
            }
           
            calculateNumbers() {
                for (let r = 0; r < this.rows; r++) {
                    for (let c = 0; c < this.cols; c++) {
                        if (this.grid[r][c] === -1) continue;
                        let count = 0;
                        for (let dr = -1; dr <= 1; dr++) {
                            for (let dc = -1; dc <= 1; dc++) {
                                if (dr === 0 && dc === 0) continue;
                                const nr = r + dr, nc = c + dc;
                                if (nr < 0 || nr >= this.rows || nc < 0 || nc >= this.cols) continue;
                                if (this.grid[nr][nc] === -1) count++;
                            }
                        }
                        this.grid[r][c] = count;
                    }
                }
            }
           
            reveal(r, c) {
                if (this.gameOver || this.revealed[r][c] || this.flagged[r][c]) return false;
               
                if (this.firstClick) {
                    this.firstClick = false;
                    this.placeMines(r, c);
                    this.startTimer();
                }
               
                this.revealed[r][c] = true;
                this.revealedValues[r][c] = this.grid[r][c];
               
                if (this.grid[r][c] === -1) {
                    this.gameOver = true;
                    this.revealAllMines();
                    return false;
                }
               
                if (this.grid[r][c] === 0) this.floodFill(r, c);
                this.checkWin();
                return true;
            }
           
            floodFill(r, c) {
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        if (dr === 0 && dc === 0) continue;
                        const nr = r + dr, nc = c + dc;
                        if (nr < 0 || nr >= this.rows || nc < 0 || nc >= this.cols) continue;
                        if (!this.revealed[nr][nc] && !this.flagged[nr][nc]) {
                            this.revealed[nr][nc] = true;
                            this.revealedValues[nr][nc] = this.grid[nr][nc];
                            if (this.grid[nr][nc] === 0) this.floodFill(nr, nc);
                        }
                    }
                }
            }
           
            toggleFlag(r, c) {
                if (this.gameOver || this.revealed[r][c]) return;
                this.flagged[r][c] = !this.flagged[r][c];
            }
           
            startTimer() {
                if (myTimerInterval) clearInterval(myTimerInterval);
                myTimerInterval = setInterval(() => {
                    if (!this.gameOver) {
                        this.timer++;
                        document.getElementById('me-timer').textContent = String(this.timer).padStart(3, '0');
                        if (currentMode === 'multi') syncMyBoardState();
                    }
                }, 1000);
            }
           
            checkWin() {
                let safeRevealed = 0;
                for (let r = 0; r < this.rows; r++) {
                    for (let c = 0; c < this.cols; c++) {
                        if (this.revealed[r][c] && this.grid[r][c] !== -1) safeRevealed++;
                    }
                }
                if (safeRevealed === this.rows * this.cols - this.mines) {
                    this.won = true;
                    this.gameOver = true;
                    clearInterval(myTimerInterval);
                    if (currentMode === 'multi') handleWin();
                }
            }
           
            revealAllMines() {
                for (let r = 0; r < this.rows; r++) {
                    for (let c = 0; c < this.cols; c++) {
                        if (this.grid[r][c] === -1) {
                            this.revealed[r][c] = true;
                            this.revealedValues[r][c] = -1;
                        }
                    }
                }
            }
           
            getState() {
                return {
                    revealed: this.revealed.map(row => [...row]),
                    flagged: this.flagged.map(row => [...row]),
                    revealedValues: this.revealedValues.map(row => [...row]),
                    timer: this.timer,
                    minesLeft: this.mines - this.flagged.flat().filter(Boolean).length,
                    won: this.won,
                    gameOver: this.gameOver
                };
            }
        }

        // ====================== Firebase 初始化 ======================
        function initFirebase() {
            if (firebaseApp) return;
            firebaseApp = firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            db = firebase.database();

            console.log("🔄 Firebase 初始化完成，正在進行匿名登入...");

            auth.onAuthStateChanged(user => {
                if (user) {
                    currentUser = user;
                    playerNickname = localStorage.getItem('nickname') || `黑空${Math.floor(Math.random() * 9999)}`;
                    document.getElementById('display-name').textContent = playerNickname;
                    document.getElementById('welcome-name').textContent = playerNickname;
                    console.log("✅ 匿名登入成功！UID:", user.uid);
                } else {
                    console.log("🔄 開始執行匿名登入...");
                    auth.signInAnonymously()
                        .then(() => console.log("✅ 匿名登入成功！"))
                        .catch(err => {
                            console.error("❌ 匿名登入失敗：", err);
                            alert("❌ 登入失敗：" + err.message);
                        });
                }
            });
        }

        // ====================== UI 切換 ======================
        function showScreen(screen) {
            document.querySelectorAll('#app > div[id^="screen-"]').forEach(el => el.classList.add('hidden'));
            const target = document.getElementById(`screen-${screen}`);
            if (target) target.classList.remove('hidden');
        }

        // ====================== 單人模式 ======================
        function startSinglePlayer() {
            currentMode = 'single';
            selectedDifficulty = 'medium';
            myBoard = new Minesweeper(difficulties.medium.rows, difficulties.medium.cols, difficulties.medium.mines);
            showScreen('game');
            document.getElementById('opponent-panel').classList.add('hidden');
            document.getElementById('me-name').textContent = playerNickname;
            document.getElementById('me-difficulty').innerHTML = `難度：<span class="font-bold">${difficulties.medium.label}</span>`;
            renderMainBoard();
            resetGameUI();
        }

        function renderMainBoard() {
            const container = document.getElementById('main-board-container');
            container.style.gridTemplateColumns = `repeat(${myBoard.cols}, 32px)`;
            container.replaceChildren();

            for (let r = 0; r < myBoard.rows; r++) {
                for (let c = 0; c < myBoard.cols; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.r = r;
                    cell.dataset.c = c;

                    cell.addEventListener('contextmenu', e => {
                        e.preventDefault();
                        if (myBoard.gameOver) return;
                        myBoard.toggleFlag(r, c);
                        renderMainBoard();
                        if (currentMode === 'multi') syncMyBoardState();
                    });

                    cell.addEventListener('click', () => {
                        if (myBoard.gameOver) return;
                        const success = myBoard.reveal(r, c);
                        renderMainBoard();
                        if (currentMode === 'multi') syncMyBoardState();
                        if (!success && myBoard.gameOver) {
                            setTimeout(() => alert('💥 您踩到地雷了！'), 100);
                        }
                    });

                    if (myBoard.revealed[r][c]) {
                        cell.classList.add('revealed');
                        const val = myBoard.grid[r][c];
                        if (val === -1) cell.innerHTML = '💣';
                        else if (val > 0) cell.innerHTML = `<span class="number-${val}">${val}</span>`;
                    } else if (myBoard.flagged[r][c]) {
                        cell.classList.add('flagged');
                        cell.innerHTML = '🚩';
                    }
                    container.appendChild(cell);
                }
            }
        }

        function resetGameUI() {
            document.getElementById('me-timer').textContent = '000';
            document.getElementById('me-flags').textContent = myBoard.mines;
            document.getElementById('game-status-bar').classList.add('hidden');
        }

        function restartSingle() {
            document.getElementById('single-result').classList.add('hidden');
            startSinglePlayer();
        }

        // ====================== 雙人模式 ======================
        function enterLobby() {
            currentMode = 'multi';
            initFirebase();
            showScreen('lobby');
            loadRooms();
        }

        function loadRooms() {
            const listEl = document.getElementById('rooms-list');
            const noRooms = document.getElementById('no-rooms');

            if (roomsRef) roomsRef.off();
            roomsRef = db.ref('rooms');

            roomsRef.on('value', snapshot => {
                listEl.innerHTML = '';
                const rooms = snapshot.val() || {};
                let hasRoom = false;

                Object.keys(rooms).forEach(roomId => {
                    const room = rooms[roomId];
                    if (room.status !== 'waiting') return;
                    hasRoom = true;

                    const playersCount = (room.players?.host ? 1 : 0) + (room.players?.guest ? 1 : 0);
                    const card = document.createElement('div');
                    card.className = 'bg-white/10 hover:bg-white/20 rounded-3xl p-6 cursor-pointer transition';
                    card.innerHTML = `
                        <div class="flex justify-between">
                            <div class="font-mono text-3xl font-bold text-[#4ade80]">${roomId}</div>
                            <div class="text-xs px-4 h-fit bg-white/20 rounded-2xl">${difficulties[room.difficulty || 'medium'].label}</div>
                        </div>
                        <div class="flex items-center mt-6 text-sm">
                            <div>👑 ${room.players?.host?.name || '---'}</div>
                            <div class="flex-1 text-center text-white/40">vs</div>
                            <div>${room.players?.guest?.name || '等待加入'}</div>
                        </div>
                        <div class="mt-4 text-xs text-white/50">${playersCount}/2 人</div>
                    `;
                    card.onclick = () => joinRoom(roomId);
                    listEl.appendChild(card);
                });
                noRooms.classList.toggle('hidden', hasRoom);
            });
        }

        function createRoom() {
            if (!currentUser) {
                alert("🔄 Firebase 正在登入中，請等待 1~2 秒後再點擊");
                return;
            }
            const roomId = 'ROOM-' + Math.random().toString(36).substring(2, 8).toUpperCase();
            selectedDifficulty = 'medium';

            db.ref('rooms/' + roomId).set({
                id: roomId,
                created: Date.now(),
                difficulty: selectedDifficulty,
                status: 'waiting',
                players: {
                    host: { uid: currentUser.uid, name: playerNickname, ready: false },
                    guest: null
                },
                boardStates: { host: null, guest: null },
                winner: null,
                rematch: { host: false, guest: false }
            }).then(() => {
                currentRoomId = roomId;
                myRole = 'host';
                showScreen('screen-room');
                listenRoom();
            }).catch(err => {
                console.error(err);
                alert("❌ 建立房間失敗：" + err.message);
            });
        }

        function joinRoom(roomId) {
            currentRoomId = roomId;
            myRole = 'guest';
            db.ref('rooms/' + roomId + '/players/guest').set({
                uid: currentUser.uid,
                name: playerNickname,
                ready: false
            }).then(() => {
                showScreen('screen-room');
                listenRoom();
            });
        }

        function listenRoom() {
            db.ref('rooms/' + currentRoomId).on('value', snapshot => {
                const room = snapshot.val();
                if (!room) return;

                document.getElementById('room-id-display').textContent = room.id;

                const host = room.players?.host;
                if (host) {
                    document.getElementById('host-name').textContent = host.name + (myRole === 'host' ? ' (您)' : '');
                    document.getElementById('host-ready').classList.toggle('hidden', !host.ready);
                }

                const guest = room.players?.guest;
                if (guest) {
                    document.getElementById('guest-name').textContent = guest.name + (myRole === 'guest' ? ' (您)' : '');
                    document.getElementById('guest-ready').classList.toggle('hidden', !guest.ready);
                }

                const readyBtn = document.getElementById('ready-btn');
                const meReady = myRole === 'host' ? room.players?.host?.ready : room.players?.guest?.ready;
                readyBtn.textContent = meReady ? '取消準備' : '準備完成';

                if (room.players?.host?.ready && room.players?.guest?.ready && room.status === 'waiting') {
                    startMultiGame(room);
                }
                if (room.status === 'playing' && document.getElementById('screen-game').classList.contains('hidden')) {
                    startMultiGame(room);
                }
                if (room.winner) handleGameEnd(room);
            });
        }

        function toggleReady() {
            const path = `rooms/${currentRoomId}/players/${myRole}/ready`;
            db.ref(path).transaction(current => !current);
        }

        function leaveRoom() {
            if (confirm('確定離開房間？')) {
                db.ref('rooms/' + currentRoomId).once('value').then(s => {
                    const room = s.val();
                    if (room && room.players[myRole] && room.players[myRole].uid === currentUser.uid) {
                        db.ref(`rooms/${currentRoomId}/players/${myRole}`).remove();
                    }
                    if (myRole === 'host') db.ref('rooms/' + currentRoomId).remove();
                }).finally(() => {
                    currentRoomId = null;
                    showScreen('lobby');
                    loadRooms();
                });
            }
        }

        function startMultiGame(room) {
            showScreen('game');
            document.getElementById('opponent-panel').classList.remove('hidden');
            selectedDifficulty = room.difficulty || 'medium';
            const diff = difficulties[selectedDifficulty];
            myBoard = new Minesweeper(diff.rows, diff.cols, diff.mines);

            document.getElementById('me-name').textContent = playerNickname;
            document.getElementById('me-difficulty').innerHTML = `難度：<span class="font-bold">${diff.label}</span>`;
            document.getElementById('opponent-name').textContent = myRole === 'host' ? room.players.guest.name : room.players.host.name;

            renderMainBoard();
            resetGameUI();
            listenOpponentBoard();
        }

        function listenOpponentBoard() {
            const oppRole = myRole === 'host' ? 'guest' : 'host';
            db.ref(`rooms/${currentRoomId}/boardStates/${oppRole}`).on('value', snap => {
                opponentBoardState = snap.val();
                if (!opponentBoardState) return;
                renderMiniBoard();
                document.getElementById('opponent-timer').textContent = String(opponentBoardState.timer || 0).padStart(3, '0');
                document.getElementById('opponent-flags').textContent = opponentBoardState.minesLeft || 0;
                if (opponentBoardState.won) handleGameEnd({winner: oppRole});
            });
        }

        function renderMiniBoard() {
            if (!opponentBoardState) return;
            const container = document.getElementById('mini-board-container');
            container.style.gridTemplateColumns = `repeat(${myBoard.cols}, 16px)`;
            container.replaceChildren();

            const rows = opponentBoardState.revealed.length;
            const cols = opponentBoardState.revealed[0].length;

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (opponentBoardState.revealed[r][c]) {
                        cell.classList.add('revealed');
                        const val = opponentBoardState.revealedValues[r][c];
                        if (val === -1) cell.innerHTML = '💣';
                        else if (val > 0) cell.innerHTML = `<span class="number-${val}">${val}</span>`;
                    } else if (opponentBoardState.flagged[r][c]) {
                        cell.classList.add('flagged');
                        cell.innerHTML = '🚩';
                    }
                    container.appendChild(cell);
                }
            }
        }

        function syncMyBoardState() {
            if (!currentRoomId || !myBoard) return;
            const state = myBoard.getState();
            db.ref(`rooms/${currentRoomId}/boardStates/${myRole}`).set(state);
        }

        function handleWin() {
            syncMyBoardState();
            db.ref(`rooms/${currentRoomId}`).update({ status: 'finished', winner: myRole });
        }

        function handleGameEnd(room) {
            clearInterval(myTimerInterval);
            const isWinner = room.winner === myRole;
            const modal = document.getElementById('result-modal');
            document.getElementById('result-title').innerHTML = isWinner ? `🎉 您獲勝！<br><span class="text-2xl">率先完成踩地雷</span>` : `😢 對手獲勝`;
            document.getElementById('result-subtitle').innerHTML = isWinner ? `您的時間 <span class="font-mono">${myBoard.timer}</span> 秒` : `對手已完成`;
            document.getElementById('rematch-count').textContent = '0/2';
            modal.classList.remove('hidden');
            db.ref(`rooms/${currentRoomId}/rematch`).set({host: false, guest: false});
        }

        function rematch() {
            const btn = document.getElementById('rematch-btn');
            btn.style.opacity = 0.5;
            db.ref(`rooms/${currentRoomId}/rematch/${myRole}`).set(true);
            db.ref(`rooms/${currentRoomId}/rematch`).on('value', snap => {
                const rem = snap.val() || {};
                const count = (rem.host ? 1 : 0) + (rem.guest ? 1 : 0);
                document.getElementById('rematch-count').innerHTML = `${count}/2`;
                if (count === 2) {
                    setTimeout(() => {
                        db.ref(`rooms/${currentRoomId}`).update({
                            status: 'playing',
                            winner: null,
                            boardStates: { host: null, guest: null },
                            rematch: { host: false, guest: false }
                        });
                        document.getElementById('result-modal').classList.add('hidden');
                    }, 3000);
                }
            });
        }

        function returnToRoom() {
            document.getElementById('result-modal').classList.add('hidden');
            db.ref(`rooms/${currentRoomId}/status`).set('waiting');
            showScreen('screen-room');
        }

        function backToHome() {
            if (currentRoomId) leaveRoom();
            currentMode = null;
            showScreen('home');
        }

        function logout() {
            if (confirm('確定登出？')) {
                auth.signOut();
                location.reload();
            }
        }

        // ====================== 啟動 ======================
        window.onload = function() {
            initFirebase();
            showScreen('home');
            console.log('%c🎮 踩地雷對戰網站已載入！專業設計已完美還原您上傳的圖片風格。', 'color:#4ade80;font-size:16px;font-weight:bold');
            console.log('✅ 單人模式 • 雙人即時房間 • 準備機制 • 再來一局 1/2 2/2 • 3秒自動開始');
        };
    </script>
</body>
</html>
